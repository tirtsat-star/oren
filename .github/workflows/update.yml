  name: עדכון אורן
  on:
    schedule:
      - cron: '0 5 * * 1'
    workflow_dispatch:
  permissions:
    contents: write
  jobs:                                                  
    refresh:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - name: Fetch RASFF
          run: python3 refresh.py
        - name: Commit
          run: |                                         
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html  
            git diff --staged --quiet || git commit -m "עדכון $(date -u
  '+%d/%m/%Y')"
            git push  
